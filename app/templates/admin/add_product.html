{% extends 'base.html' %}
{% block title %}Add Product | Luxon Admin{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm p-4">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                    <h3 class="fw-bold m-0 text-navy">Add New Product</h3>
                    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
                </div>
                
                <form method="POST" action="{{ url_for('admin.add_product') }}" enctype="multipart/form-data">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Product Name</label>
                            <input type="text" class="form-control bg-light border-0" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Brand</label>
                            <input type="text" class="form-control bg-light border-0" name="brand">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Description</label>
                        <textarea class="form-control bg-light border-0" name="description" rows="4"></textarea>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Price (₹)</label>
                            <input type="number" step="0.01" class="form-control bg-light border-0" name="price" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Stock Quantity</label>
                            <input type="number" class="form-control bg-light border-0" name="stock" value="0" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Category</label>
                            <select class="form-select bg-light border-0" name="category_id" required>
                                {% for c in categories %}
                                    <option value="{{ c.id }}">{{ c.name }}</option>
                                {% else %}
                                    <option value="" disabled selected>No categories exist!</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Product Image (Cloudinary Upload)</label>
                        <input class="form-control bg-light border-0" type="file" name="image" accept="image/*">
                    </div>
                    
                    <button type="submit" class="btn btn-gold w-100 py-2 fw-bold">Save Product</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
