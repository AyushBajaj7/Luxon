{% extends 'base.html' %}
{% block title %}Edit Product | Admin | Luxon{% endblock %}
{% block content %}
<div class="min-h-screen bg-slate-50/50 py-12">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div class="flex items-center">
                <a href="{{ url_for('admin.dashboard') }}" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-slate-400 hover:text-navy hover:bg-slate-50 shadow-sm transition-colors border border-slate-100 mr-4 flex-shrink-0">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h3 class="text-3xl font-serif font-bold text-navy line-clamp-1">Edit: {{ product.name }}</h3>
            </div>
            
            <form action="{{ url_for('admin.delete_product', id=product.id) }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this product?');">
                <button type="submit" class="bg-red-50 hover:bg-red-500 text-red-500 hover:text-white px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest transition-colors flex items-center">
                    <i class="bi bi-trash mr-2"></i> Delete
                </button>
            </form>
        </div>
        
        <div class="bg-white/80 border border-slate-100 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] overflow-hidden">
            <div class="p-8 md:p-10">
                <form action="{{ url_for('admin.edit_product', id=product.id) }}" method="POST" enctype="multipart/form-data">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Product Name *</label>
                            <input type="text" name="name" value="{{ product.name }}" required class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-navy/10 focus:border-navy transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Brand</label>
                            <input type="text" name="brand" value="{{ product.brand or '' }}" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-navy/10 focus:border-navy transition-all">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Selling Price (₹) *</label>
                            <input type="number" step="0.01" name="price" value="{{ product.price }}" required class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-navy/10 focus:border-navy transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Original Price (₹)</label>
                            <input type="number" step="0.01" name="original_price" value="{{ product.original_price or '' }}" placeholder="Optional" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-navy/10 focus:border-navy transition-all placeholder:text-slate-300">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Stock Quantity *</label>
                            <input type="number" name="stock" value="{{ product.stock }}" required class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-navy/10 focus:border-navy transition-all">
                        </div>
                    </div>
                    
                    <div class="mb-8">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Category *</label>
                        <div class="relative">
                            <select name="category_id" required class="w-full appearance-none bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-navy/10 focus:border-navy transition-all cursor-pointer">
                                <option value="">Select a category</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                                <i class="bi bi-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-8 bg-slate-50 border border-slate-100 rounded-2xl p-6">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Product Image</label>
                        
                        <div class="flex flex-col sm:flex-row items-center gap-6">
                            {% if product.image_url %}
                            <div class="flex-shrink-0">
                                <img src="{{ product.image_url }}" alt="Product Image" class="w-24 h-24 rounded-xl object-cover border border-slate-200 shadow-sm bg-white">
                            </div>
                            {% endif %}
                            
                            <div class="flex-grow w-full">
                                <label class="block text-xs font-semibold text-slate-600 mb-2">Upload New Image (Optional)</label>
                                <input type="file" name="image" accept="image/*" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm file:mr-4 file:py-1.5 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:uppercase file:tracking-widest file:bg-navy file:text-white hover:file:bg-gold file:cursor-pointer transition-all cursor-pointer text-slate-500">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-10">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Description</label>
                        <textarea name="description" rows="5" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-navy/10 focus:border-navy transition-all resize-none">{{ product.description or '' }}</textarea>
                    </div>
                    
                    <button type="submit" class="w-full bg-navy hover:bg-gold text-white hover:text-navy py-4 rounded-full font-bold uppercase tracking-widest text-sm transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                        Update Product
                    </button>
                    
                </form>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
