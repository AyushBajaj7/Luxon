services:
  - type: web
    name: luxon
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: luxon-db
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FLASK_APP
        value: run.py
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: luxon-db
    databaseName: luxon
    user: luxon
