{% extends 'base.html' %}
{% block title %}Payment - Luxon{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm p-4">
                <h3 class="fw-bold mb-3" style="font-family: 'Playfair Display', serif;">Complete Your Purchase</h3>
                <p class="text-muted mb-4">Please securely complete your payment to finalize Order #{{ order.id }}.</p>
                
                <h2 class="text-gold fw-bold mb-4">₹{{ "%.2f"|format(payment.amount) }}</h2>
                
                <button id="rzp-button1" class="btn btn-navy w-100 rounded-pill py-3 fw-bold shadow-sm">Pay Now</button>
                <p class="text-muted mt-3 small"><i class="bi bi-shield-lock-fill me-1"></i> Secured by Razorpay</p>
            </div>
        </div>
    </div>
</div>

<form action="{{ url_for('shop.payment_verify') }}" method="POST" id="verify-form" class="d-none">
    <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
    <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
    <input type="hidden" name="razorpay_signature" id="razorpay_signature">
</form>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
var options = {
    "key": "{{ key_id }}",
    "amount": "{{ (payment.amount * 100)|int }}",
    "currency": "USD",
    "name": "Luxon",
    "description": "Order #{{ order.id }}",
    "image": "{{ url_for('static', filename='img/logo.png', _external=True) }}",
    "order_id": "{{ payment.razorpay_order_id }}",
    "handler": function (response){
        document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
        document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
        document.getElementById('razorpay_signature').value = response.razorpay_signature;
        document.getElementById('verify-form').submit();
    },
    "prefill": {
        "name": "{{ current_user.full_name }}",
        "email": "{{ current_user.email }}"
    },
    "theme": {
        "color": "#0F172A"
    }
};
var rzp1 = new Razorpay(options);
rzp1.on('payment.failed', function (response){
        alert("Payment Failed. Reason: " + response.error.description);
});
document.getElementById('rzp-button1').onclick = function(e){
    rzp1.open();
    e.preventDefault();
}

// Auto open on load for smoother UX
window.onload = function() {
    rzp1.open();
}
</script>
{% endblock %}
